<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booyah Director — Live Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root { --primary-color:#ff4e00; --accent-glow:#ffaa00; --bg-dark:rgba(12,12,14,0.88); --bg-panel:rgba(20,20,24,0.92); --text-main:#fff; --text-muted:#8a8a8e; --border-glow:rgba(255,78,0,0.4); --clip-angle:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%); --clip-angled:polygon(0 0,calc(100% - 12px) 0,100% 100%,12px 100%); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1920px; height:1080px; overflow:hidden; font-family:'Rajdhani',sans-serif; background:transparent; color:var(--text-main); -webkit-font-smoothing:antialiased; }
.scoreboard-wrap { position:absolute; top:60px; right:0; width:360px; z-index:10; }
.sb-header { display:flex; align-items:center; justify-content:space-between; padding:6px 16px 6px 20px; background:var(--primary-color); clip-path:var(--clip-angle); margin-bottom:2px; filter:drop-shadow(0 0 8px var(--border-glow)); height:36px; }
.sb-header-left { display:flex; align-items:center; gap:8px; }
.sb-tour-logo { width:22px; height:22px; border-radius:2px; object-fit:cover; border:1px solid rgba(255,255,255,0.3); }
.sb-tour-name { font-family:'Teko',sans-serif; font-size:18px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:#fff; line-height:1; }
.sb-match-info { font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; color:rgba(255,255,255,0.85); text-transform:uppercase; }
.team-row { display:grid; grid-template-columns:36px 28px 1fr 50px 40px; align-items:center; height:40px; background:var(--bg-panel); border-bottom:1px solid rgba(255,255,255,0.06); transition:all 0.3s; position:relative; overflow:hidden; }
.team-row:last-child { border-bottom:none; }
.team-row.dead { opacity:0.45; }
.team-row.champion-eligible { border-left:3px solid #ffd700; background:linear-gradient(90deg,rgba(255,215,0,0.12) 0%,var(--bg-panel) 30%); box-shadow:inset 0 0 12px rgba(255,215,0,0.08); }
.team-row.champion-eligible .t-rank { color:#ffd700; text-shadow:0 0 6px rgba(255,215,0,0.6); }
.t-rank { text-align:center; font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; color:var(--accent-glow); height:100%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.35); }
.t-logo { width:28px; height:28px; display:flex; align-items:center; justify-content:center; padding:0 4px; }
.t-logo img { width:24px; height:24px; object-fit:cover; border-radius:2px; }
.t-logo-fallback { width:24px; height:24px; border-radius:2px; background:var(--team-accent,var(--primary-color)); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-weight:900; font-size:9px; color:#fff; clip-path:var(--clip-angled); }
.t-name { padding:0 8px; font-size:14px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-headstart { font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700; color:#ffd700; opacity:0.8; padding-left:2px; }
.t-life { display:flex; gap:2px; justify-content:center; align-items:center; height:100%; }
.life-bar { width:4px; height:16px; border-radius:1px; background:#2a5a2a; transition:all 0.3s; }
.life-bar.alive { background:#00ff44; box-shadow:0 0 4px rgba(0,255,68,0.6); }
.life-bar.dead { background:#333; }
.t-kills { text-align:center; font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; color:var(--primary-color); }
.empty-state { padding:40px 20px; text-align:center; color:var(--text-muted); font-family:'Teko',sans-serif; font-size:16px; letter-spacing:2px; text-transform:uppercase; background:var(--bg-panel); clip-path:var(--clip-angle); }
.match-chip { position:absolute; bottom:40px; left:40px; display:flex; align-items:center; gap:12px; background:var(--bg-panel); padding:8px 16px; clip-path:var(--clip-angle); border-left:3px solid var(--primary-color); filter:drop-shadow(0 0 8px var(--border-glow)); z-index:10; }
.match-chip-label { font-family:'Teko',sans-serif; font-size:14px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
.match-chip-value { font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; color:var(--accent-glow); letter-spacing:1px; }
.sponsor-wrap { position:absolute; bottom:40px; right:40px; display:flex; align-items:center; gap:10px; z-index:10; opacity:0.85; }
.sponsor-logo { width:40px; height:40px; object-fit:contain; border-radius:2px; }
.sponsor-label { font-family:'Teko',sans-serif; font-size:14px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
.elim-banner { position:absolute; bottom:100px; left:40px; display:flex; align-items:stretch; z-index:20; animation:elimSlide 0.5s cubic-bezier(0.16,1,0.3,1); }
@keyframes elimSlide { from{transform:translateX(-200px);opacity:0;} to{transform:translateX(0);opacity:1;} }
.elim-banner-left { width:140px; background:var(--primary-color); clip-path:polygon(0 0,100% 0,75% 100%,0% 100%); display:flex; align-items:center; justify-content:center; font-family:'Teko',sans-serif; font-size:22px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#fff; filter:drop-shadow(0 0 8px var(--border-glow)); }
.elim-banner-right { background:var(--bg-panel); padding:8px 16px 8px 20px; clip-path:polygon(0 0,100% 0,100% 100%,12px 100%); display:flex; align-items:center; gap:10px; margin-left:-2px; }
.elim-team-logo { width:32px; height:32px; border-radius:3px; object-fit:cover; border:1px solid #333; }
.elim-team-info { display:flex; flex-direction:column; gap:2px; }
.elim-team-name { font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-main); }
.elim-team-place { font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; color:var(--accent-glow); letter-spacing:1px; }
.tour-watermark { position:absolute; top:40px; left:40px; display:flex; align-items:center; gap:10px; z-index:10; }
.tw-logo { width:36px; height:36px; border-radius:3px; object-fit:cover; border:1px solid #333; }
.tw-name { font-family:'Teko',sans-serif; font-size:22px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text-main); text-shadow:0 2px 8px rgba(0,0,0,0.8); }
.scanline { position:fixed; inset:0; pointer-events:none; z-index:100; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); }
.connecting { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); z-index:999; font-family:'Orbitron',sans-serif; font-size:18px; letter-spacing:3px; text-transform:uppercase; color:var(--accent-glow); }
.champion-celebration { position:fixed; inset:0; z-index:500; display:none; align-items:center; justify-content:center; background:radial-gradient(ellipse at center,rgba(0,0,0,0.85),rgba(0,0,0,0.95)); pointer-events:none; }
.champion-celebration.active { display:flex; animation:celebFadeIn 0.8s ease-out; }
@keyframes celebFadeIn { from{opacity:0;} to{opacity:1;} }
.champion-banner { text-align:center; animation:celebScale 0.6s cubic-bezier(0.16,1,0.3,1); }
@keyframes celebScale { from{transform:scale(0.3);opacity:0;} to{transform:scale(1);opacity:1;} }
.champion-crown { font-size:80px; line-height:1; filter:drop-shadow(0 0 20px #ffd700); animation:crownFloat 2s ease-in-out infinite; }
@keyframes crownFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
.champion-label { font-family:'Teko',sans-serif; font-size:48px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,0.8),0 0 40px rgba(255,215,0,0.4); margin-top:10px; }
.champion-team { font-family:'Orbitron',sans-serif; font-size:36px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--text-main); margin-top:12px; text-shadow:0 0 16px var(--primary-color); }
.champion-points { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; color:var(--accent-glow); margin-top:8px; letter-spacing:2px; }
.rush-progress { position:absolute; top:96px; right:0; width:360px; height:4px; background:rgba(255,255,255,0.1); z-index:11; }
.rush-progress-fill { height:100%; background:linear-gradient(90deg,#ffd700,var(--primary-color)); width:0%; transition:width 0.5s ease; filter:drop-shadow(0 0 4px rgba(255,215,0,0.6)); }
.rush-progress-label { position:absolute; right:8px; top:-14px; font-family:'Orbitron',sans-serif; font-size:8px; font-weight:700; color:#ffd700; letter-spacing:1px; text-transform:uppercase; opacity:0.7; }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="connecting" id="connecting">Connecting</div>
<div class="tour-watermark" id="tourWatermark" style="display:none;"><img class="tw-logo" id="twLogo" onerror="this.style.display='none'"><div class="tw-name" id="twName"></div></div>
<div class="scoreboard-wrap" id="scoreboardWrap" style="display:none;">
  <div class="sb-header"><div class="sb-header-left"><img class="sb-tour-logo" id="sbTourLogo" onerror="this.style.display='none'"><div class="sb-tour-name" id="sbTourName">Tournament</div></div><div class="sb-match-info" id="sbMatchInfo">Match 1</div></div>
  <div id="teamRows"></div>
</div>
<div class="match-chip" id="matchChip" style="display:none;"><div class="match-chip-label" id="mcLabel">Live</div><div class="match-chip-value" id="mcValue">—</div></div>
<div class="sponsor-wrap" id="sponsorWrap" style="display:none;"><img class="sponsor-logo" id="sponsorLogo" onerror="this.style.display='none'"><div class="sponsor-label" id="sponsorLabel"></div></div>
<div class="elim-banner" id="elimBanner" style="display:none;"><div class="elim-banner-left">ELIMINATED</div><div class="elim-banner-right"><img class="elim-team-logo" id="elimLogo" onerror="this.style.display='none'"><div class="elim-team-info"><div class="elim-team-name" id="elimTeamName"></div><div class="elim-team-place" id="elimPlace"></div></div></div></div>
<div class="champion-celebration" id="championCelebration"><div class="champion-banner"><div class="champion-crown">👑</div><div class="champion-label">Champion</div><div class="champion-team" id="champTeam"></div><div class="champion-points" id="champPoints"></div></div></div>
<div class="rush-progress" id="rushProgress" style="display:none;"><div class="rush-progress-label" id="rushLabel">Rush 80</div><div class="rush-progress-fill" id="rushFill"></div></div>
<script>
const API = '';
let state = { tournament:{name:'',logo:'',sponsor:'',sponsorLogo:''}, theme:{preset:'ffws-neon-orange',primaryColor:'#ff4e00',accentGlow:'#ffaa00',bgDark:'#0c0c0e',textMain:'#fff'}, tournamentSettings:{championRushThreshold:80}, headstartPoints:{}, matches:[], standings:[], teams:[] };
let prevAlive = {};
let championRushThreshold = 80;
let lastChampionId = null;

async function pollState() {
  try {
    const r = await fetch(API + '/api/broadcastState');
    if (!r.ok) throw new Error('bad response');
    const data = await r.json();
    if (data && data.teams) {
      const oldStandings = state.standings || [];
      state = { ...state, ...data };
      if (data.teams) state.teams = data.teams;
      if (data.theme) state.theme = data.theme;
      if (data.tournamentSettings) championRushThreshold = data.tournamentSettings.championRushThreshold || 80;
      document.getElementById('connecting').style.display = 'none';
      applyThemeCSS(state.theme);
      renderOverlay();
      // Check for new champion from standings
      if (state.standings) {
        const champ = state.standings.find(t => t.isTournamentWinner);
        if (champ && champ.teamId !== lastChampionId) {
          lastChampionId = champ.teamId;
          showChampionCelebration(champ);
        }
      }
    }
  } catch(_) {}
}
setInterval(pollState, 2000);

function applyThemeCSS(t) { const r=document.documentElement; r.style.setProperty('--primary-color',t.primaryColor); r.style.setProperty('--accent-glow',t.accentGlow); r.style.setProperty('--bg-panel',adjustAlpha(t.bgDark,0.92)); r.style.setProperty('--text-main',t.textMain); r.style.setProperty('--border-glow',hexToRgba(t.primaryColor,0.4)); }
function renderOverlay() { renderBranding(); renderScoreboard(); renderMatchChip(); renderSponsor(); checkElims(); }
function renderBranding() { const wm=document.getElementById('tourWatermark'),t=state.tournament; if(t&&t.name){wm.style.display='flex';document.getElementById('twName').textContent=t.name;document.getElementById('twLogo').src=t.logo||'';document.getElementById('twLogo').style.display=t.logo?'block':'none';document.getElementById('sbTourName').textContent=t.name;document.getElementById('sbTourLogo').src=t.logo||'';document.getElementById('sbTourLogo').style.display=t.logo?'block':'none';}else{wm.style.display='none';} }
function renderScoreboard() {
  const wrap=document.getElementById('scoreboardWrap'),rowsEl=document.getElementById('teamRows');
  // Use standings if available, otherwise fall back to teams
  let displayData = [];
  if (state.standings && state.standings.length > 0) {
    displayData = state.standings;
  } else {
    displayData = (state.teams||[]).filter(t=>t.teamName&&t.teamName!=='Team '+t.id).map((t,idx)=>({teamId:t.id,teamName:t.teamName,shortName:t.shortName,logoUrl:t.logoUrl,themeColor:t.themeColor,liveStats:t.liveStats,matchPoints:0,headstartPoints:0,totalPoints:0,totalKills:t.liveStats?.kills||0,isEligible:false,isTournamentWinner:false}));
  }
  if(displayData.length===0){wrap.style.display='block';rowsEl.innerHTML='<div class="empty-state">No Teams Yet</div>';return;}
  wrap.style.display='block';rowsEl.innerHTML='';
  displayData.forEach((team,idx)=>{
    const alive=team.liveStats?.alive||0,isDead=alive===0,eligible=team.isEligible,winner=team.isTournamentWinner;
    const row=document.createElement('div');
    let cls='team-row';if(isDead)cls+=' dead';if(eligible)cls+=' champion-eligible';
    row.className=cls;
    row.style.setProperty('--team-accent',team.themeColor||state.theme.primaryColor);
    let h='<div class="t-rank">'+(idx+1)+'</div>';
    if(team.logoUrl){h+='<div class="t-logo"><img src="'+escA(team.logoUrl)+'" onerror="this.style.display=\'none\'"></div>';}else{h+='<div class="t-logo"><div class="t-logo-fallback">'+escH(team.shortName||('T'+team.teamId))+'</div></div>';}
    h+='<div class="t-name">'+escH(team.teamName);
    if(team.headstartPoints>0) h+=' <span class="t-headstart">+'+team.headstartPoints+'</span>';
    h+='</div>';
    h+='<div class="t-life">';for(let i=0;i<4;i++){h+='<div class="life-bar '+(i<alive?'alive':'dead')+'"></div>';}h+='</div>';
    h+='<div class="t-kills">'+(team.totalPoints||0)+'</div>';
    row.innerHTML=h;rowsEl.appendChild(row);
  });
  // Update rush progress
  if(displayData.length>0){const top=displayData[0];const pts=top.totalPoints||0;const pct=Math.min(100,(pts/championRushThreshold)*100);const bar=document.getElementById('rushProgress'),fill=document.getElementById('rushFill'),label=document.getElementById('rushLabel');if(bar&&fill&&label){bar.style.display='block';fill.style.width=pct+'%';label.textContent='Rush '+championRushThreshold+' | '+pts+'pts';}}
}
function renderMatchChip(){const c=document.getElementById('matchChip'),t=state.tournament;if(t&&t.name){c.style.display='flex';document.getElementById('mcValue').textContent='Match '+(state.matches?.length||0+1);}else{c.style.display='none';}}
function renderSponsor(){const sw=document.getElementById('sponsorWrap'),t=state.tournament;if(t&&(t.sponsor||t.sponsorLogo)){sw.style.display='flex';document.getElementById('sponsorLabel').textContent=t.sponsor||'';document.getElementById('sponsorLabel').style.display=t.sponsor?'block':'none';document.getElementById('sponsorLogo').src=t.sponsorLogo||'';document.getElementById('sponsorLogo').style.display=t.sponsorLogo?'block':'none';}else{sw.style.display='none';}}
function checkElims(){(state.teams||[]).forEach(t=>{const id=t.id,ca=t.liveStats?.alive||0,pa=prevAlive[id]??4;if(pa>0&&ca===0&&t.teamName&&t.teamName!=='Team '+t.id)showElimBanner(t);prevAlive[id]=ca;});}
function showElimBanner(team){const b=document.getElementById('elimBanner');document.getElementById('elimLogo').src=team.logoUrl||'';document.getElementById('elimLogo').style.display=team.logoUrl?'block':'none';document.getElementById('elimTeamName').textContent=team.teamName;const dc=(state.teams||[]).filter(t=>(t.liveStats?.alive||0)===0).length;document.getElementById('elimPlace').textContent='#'+(13-dc)+' Placement';b.style.display='flex';b.style.animation='none';void b.offsetHeight;b.style.animation='';setTimeout(()=>{b.style.display='none';},4000);}
function showChampionCelebration(champ){const el=document.getElementById('championCelebration');document.getElementById('champTeam').textContent=champ.teamName;document.getElementById('champPoints').textContent=champ.totalPoints+' Points';el.classList.add('active');setTimeout(()=>{el.classList.remove('active');},8000);}
function hexToRgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function adjustAlpha(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function escH(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escA(s){return String(s||'').replace(/"/g,'&quot;');}
pollState();
</script>
</body>
</html>
