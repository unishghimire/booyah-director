<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booyah Director — Live Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
/* ═══ ROOT THEME VARIABLES (synced from controller) ═══ */
:root {
  --primary-color: #ff4e00;
  --accent-glow:   #ffaa00;
  --bg-dark:       rgba(12,12,14,0.88);
  --bg-panel:      rgba(20,20,24,0.92);
  --text-main:     #ffffff;
  --text-muted:    #8a8a8e;
  --border-glow:   rgba(255,78,0,0.4);
  --clip-angle:    polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  --clip-angled:   polygon(0 0, calc(100% - 12px) 0, 100% 100%, 12px 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1920px; height: 1080px;
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
  background: transparent;
  color: var(--text-main);
  -webkit-font-smoothing: antialiased;
}

/* ═══ SCOREBOARD CONTAINER (right-side, FFWS style) ═══ */
.scoreboard-wrap {
  position: absolute;
  top: 60px;
  right: 0;
  width: 360px;
  z-index: 10;
}

/* ═══ SCOREBOARD HEADER ═══ */
.sb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px 6px 20px;
  background: var(--primary-color);
  clip-path: var(--clip-angle);
  margin-bottom: 2px;
  filter: drop-shadow(0 0 8px var(--border-glow));
  height: 36px;
}
.sb-header-left { display: flex; align-items: center; gap: 8px; }
.sb-tour-logo {
  width: 22px; height: 22px; border-radius: 2px;
  object-fit: cover; border: 1px solid rgba(255,255,255,0.3);
}
.sb-tour-name {
  font-family: 'Teko', sans-serif; font-size: 18px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #fff; line-height: 1;
}
.sb-match-info {
  font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; color: rgba(255,255,255,0.85);
  text-transform: uppercase;
}

/* ═══ TEAM ROW ═══ */
.team-row {
  display: grid;
  grid-template-columns: 36px 28px 1fr 50px 40px;
  align-items: center;
  height: 40px;
  background: var(--bg-panel);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.team-row:last-child { border-bottom: none; }
.team-row.dead { opacity: 0.45; }

/* Rank number */
.t-rank {
  text-align: center;
  font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--accent-glow);
  height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.35);
}

/* Team logo */
.t-logo {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
}
.t-logo img {
  width: 24px; height: 24px; object-fit: cover; border-radius: 2px;
}
.t-logo-fallback {
  width: 24px; height: 24px; border-radius: 2px;
  background: var(--team-accent, var(--primary-color));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 9px;
  color: #fff;
  clip-path: var(--clip-angled);
}

/* Team name */
.t-name {
  padding: 0 8px;
  font-size: 14px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-main);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Life indicators (4 bars) */
.t-life {
  display: flex; gap: 2px; justify-content: center; align-items: center;
  height: 100%;
}
.life-bar {
  width: 4px; height: 16px; border-radius: 1px;
  background: #2a5a2a;
  transition: all 0.3s;
}
.life-bar.alive {
  background: #00ff44;
  box-shadow: 0 0 4px rgba(0,255,68,0.6);
}
.life-bar.dead {
  background: #333;
}

/* Kills stat */
.t-kills {
  text-align: center;
  font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--primary-color);
}

/* ═══ EMPTY STATE ═══ */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
  font-family: 'Teko', sans-serif; font-size: 16px;
  letter-spacing: 2px; text-transform: uppercase;
  background: var(--bg-panel);
  clip-path: var(--clip-angle);
}
.empty-state-hint { font-size: 11px; margin-top: 8px; opacity: 0.6; }

/* ═══ MATCH INFO CHIP (bottom-left) ═══ */
.match-chip {
  position: absolute;
  bottom: 40px;
  left: 40px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-panel);
  padding: 8px 16px;
  clip-path: var(--clip-angle);
  border-left: 3px solid var(--primary-color);
  filter: drop-shadow(0 0 8px var(--border-glow));
  z-index: 10;
}
.match-chip-label {
  font-family: 'Teko', sans-serif; font-size: 14px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted);
}
.match-chip-value {
  font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--accent-glow);
  letter-spacing: 1px;
}

/* ═══ SPONSOR BRANDING (bottom-right) ═══ */
.sponsor-wrap {
  position: absolute;
  bottom: 40px;
  right: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
  opacity: 0.85;
}
.sponsor-logo {
  width: 40px; height: 40px; object-fit: contain;
  border-radius: 2px;
}
.sponsor-label {
  font-family: 'Teko', sans-serif; font-size: 14px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted);
}

/* ═══ ELIMINATED BANNER ═══ */
.elim-banner {
  position: absolute;
  bottom: 100px;
  left: 40px;
  display: flex;
  align-items: stretch;
  z-index: 20;
  animation: elimSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes elimSlide {
  from { transform: translateX(-200px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.elim-banner-left {
  width: 140px;
  background: var(--primary-color);
  clip-path: polygon(0 0, 100% 0, 75% 100%, 0% 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Teko', sans-serif; font-size: 22px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: #fff;
  filter: drop-shadow(0 0 8px var(--border-glow));
}
.elim-banner-right {
  background: var(--bg-panel);
  padding: 8px 16px 8px 20px;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 12px 100%);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: -2px;
}
.elim-team-logo {
  width: 32px; height: 32px; border-radius: 3px;
  object-fit: cover; border: 1px solid var(--border-dim);
}
.elim-team-info { display: flex; flex-direction: column; gap: 2px; }
.elim-team-name {
  font-size: 15px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-main);
}
.elim-team-place {
  font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
  color: var(--accent-glow); letter-spacing: 1px;
}

/* ═══ CHAMPION RUSH BADGE ═══ */
.champion-badge {
  position: absolute;
  top: 100px;
  right: 380px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #ffd700 0%, #ff4e00 100%);
  padding: 4px 12px;
  clip-path: var(--clip-angle);
  font-family: 'Teko', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #000;
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
  z-index: 15;
  animation: championPulse 1.5s ease-in-out infinite;
}
@keyframes championPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ═══ PLAYER STATUS POPUP ═══ */
.player-popup {
  position: absolute;
  top: 160px;
  right: 380px;
  width: 280px;
  background: var(--bg-panel);
  border: 1px solid var(--primary-color);
  clip-path: var(--clip-angle);
  padding: 10px;
  z-index: 15;
  filter: drop-shadow(0 0 8px var(--border-glow));
  display: none;
}
.player-popup.active { display: block; animation: popupSlide 0.3s ease-out; }
@keyframes popupSlide {
  from { transform: translateX(20px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.pp-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.pp-logo { width: 28px; height: 28px; border-radius: 2px; object-fit: cover; }
.pp-name {
  font-family: 'Teko', sans-serif; font-size: 16px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-main);
}
.pp-row {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0;
  font-size: 12px;
}
.pp-player-img {
  width: 22px; height: 22px; border-radius: 2px; object-fit: cover;
  background: var(--border-dim);
}
.pp-player-name { flex: 1; color: var(--text-main); font-weight: 500; }
.pp-player-status {
  width: 8px; height: 8px; border-radius: 50%;
}
.pp-player-status.alive { background: #00ff44; box-shadow: 0 0 4px #00ff44; }
.pp-player-status.dead { background: #ff4444; }

/* ═══ TOURNAMENT WATERMARK (top-left) ═══ */
.tour-watermark {
  position: absolute;
  top: 40px;
  left: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
}
.tw-logo {
  width: 36px; height: 36px; border-radius: 3px;
  object-fit: cover; border: 1px solid var(--border-dim);
}
.tw-name {
  font-family: 'Teko', sans-serif; font-size: 22px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-main);
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

/* ═══ SCANLINE OVERLAY (subtle) ═══ */
.scanline {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 100;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
}

/* ═══ CONNECTING STATE ═══ */
.connecting {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.9); z-index: 999;
  font-family: 'Orbitron', sans-serif; font-size: 18px;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent-glow);
}
.connecting::after {
  content: '...'; animation: dots 1.5s infinite;
}
@keyframes dots {
  0% { content: '   '; } 33% { content: '.  '; } 66% { content: '.. '; } 100% { content: '...'; }
}

/* ═══ CHAMPION RUSH — GOLD ELIGIBLE FRAME ═══ */
.team-row.champion-eligible {
  border-left: 3px solid #ffd700;
  background: linear-gradient(90deg, rgba(255,215,0,0.12) 0%, var(--bg-panel) 30%);
  box-shadow: inset 0 0 12px rgba(255,215,0,0.08);
}
.team-row.champion-eligible .t-rank {
  color: #ffd700;
  text-shadow: 0 0 6px rgba(255,215,0,0.6);
}

/* ═══ HEADSTART POINTS INDICATOR ═══ */
.t-headstart {
  font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
  color: #ffd700; opacity: 0.8;
  padding-left: 2px;
}

/* ═══ CHAMPION CELEBRATION OVERLAY ═══ */
.champion-celebration {
  position: fixed; inset: 0; z-index: 500;
  display: none; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.95) 100%);
  pointer-events: none;
}
.champion-celebration.active { display: flex; animation: celebFadeIn 0.8s ease-out; }
@keyframes celebFadeIn { from { opacity: 0; } to { opacity: 1; } }

.champion-banner {
  text-align: center;
  animation: celebScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes celebScale {
  from { transform: scale(0.3); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.champion-crown {
  font-size: 80px; line-height: 1;
  filter: drop-shadow(0 0 20px #ffd700);
  animation: crownFloat 2s ease-in-out infinite;
}
@keyframes crownFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.champion-label {
  font-family: 'Teko', sans-serif; font-size: 48px; font-weight: 700;
  letter-spacing: 6px; text-transform: uppercase;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4);
  margin-top: 10px;
}
.champion-team {
  font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-main);
  margin-top: 12px;
  text-shadow: 0 0 16px var(--primary-color);
}
.champion-points {
  font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700;
  color: var(--accent-glow); margin-top: 8px; letter-spacing: 2px;
}

/* ═══ RUSH PROGRESS BAR (in header) ═══ */
.rush-progress {
  position: absolute; top: 96px; right: 0;
  width: 360px; height: 4px;
  background: rgba(255,255,255,0.1);
  z-index: 11;
}
.rush-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffd700, var(--primary-color));
  width: 0%;
  transition: width 0.5s ease;
  filter: drop-shadow(0 0 4px rgba(255,215,0,0.6));
}
.rush-progress-label {
  position: absolute; right: 8px; top: -14px;
  font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
  color: #ffd700; letter-spacing: 1px;
  text-transform: uppercase; opacity: 0.7;
}
</style>
</head>
<body>

<!-- Scanline texture -->
<div class="scanline"></div>

<!-- Connecting state -->
<div class="connecting" id="connecting">Connecting</div>

<!-- Tournament watermark -->
<div class="tour-watermark" id="tourWatermark" style="display:none;">
  <img class="tw-logo" id="twLogo" onerror="this.style.display='none'">
  <div class="tw-name" id="twName"></div>
</div>

<!-- Scoreboard (right-side) -->
<div class="scoreboard-wrap" id="scoreboardWrap" style="display:none;">
  <div class="sb-header" id="sbHeader">
    <div class="sb-header-left">
      <img class="sb-tour-logo" id="sbTourLogo" onerror="this.style.display='none'">
      <div class="sb-tour-name" id="sbTourName">Tournament</div>
    </div>
    <div class="sb-match-info" id="sbMatchInfo">Match 1</div>
  </div>
  <div id="teamRows"></div>
</div>

<!-- Match info chip (bottom-left) -->
<div class="match-chip" id="matchChip" style="display:none;">
  <div class="match-chip-label" id="mcLabel">Match Day</div>
  <div class="match-chip-value" id="mcValue">—</div>
</div>

<!-- Sponsor branding (bottom-right) -->
<div class="sponsor-wrap" id="sponsorWrap" style="display:none;">
  <img class="sponsor-logo" id="sponsorLogo" onerror="this.style.display='none'">
  <div class="sponsor-label" id="sponsorLabel"></div>
</div>

<!-- Eliminated banner (animated) -->
<div class="elim-banner" id="elimBanner" style="display:none;">
  <div class="elim-banner-left">ELIMINATED</div>
  <div class="elim-banner-right">
    <img class="elim-team-logo" id="elimLogo" onerror="this.style.display='none'">
    <div class="elim-team-info">
      <div class="elim-team-name" id="elimTeamName"></div>
      <div class="elim-team-place" id="elimPlace"></div>
    </div>
  </div>
</div>

<!-- Player popup (hover) -->
<div class="player-popup" id="playerPopup">
  <div class="pp-header">
    <img class="pp-logo" id="ppLogo" onerror="this.style.display='none'">
    <div class="pp-name" id="ppName"></div>
  </div>
  <div id="ppPlayers"></div>
</div>


<!-- Champion celebration overlay -->
<div class="champion-celebration" id="championCelebration">
  <div class="champion-banner">
    <div class="champion-crown">👑</div>
    <div class="champion-label">Champion</div>
    <div class="champion-team" id="champTeam"></div>
    <div class="champion-points" id="champPoints"></div>
  </div>
</div>

<!-- Rush progress bar -->
<div class="rush-progress" id="rushProgress" style="display:none;">
  <div class="rush-progress-label" id="rushLabel">Rush 80</div>
  <div class="rush-progress-fill" id="rushFill"></div>
</div>
<script>
/* ═══════════════════════════════════════════════════════════════════════
   STATE & SOCKET
   ═══════════════════════════════════════════════════════════════════════ */
const SOCKET_ROOM = 'booyah-director-room';

let state = {
  tournament: { name: '', logo: '', sponsor: '', sponsorLogo: '' },
  theme: { preset: 'ffws-neon-orange', primaryColor: '#ff4e00', accentGlow: '#ffaa00', bgDark: '#0c0c0e', textMain: '#ffffff' },
  teams: []
};

let prevAliveCount = {};
let elimBannerTimer = null;

const socket = io({ auth: { token: SOCKET_ROOM } });

socket.on('connect', () => {
  document.getElementById('connecting').style.display = 'none';
  console.log('[Overlay] Connected:', socket.id);
});

socket.on('disconnect', () => {
  document.getElementById('connecting').style.display = 'flex';
  document.getElementById('connecting').textContent = 'Reconnecting';
});

socket.on('stateUpdated', (newState) => {
  if (!newState) return;
  state = { ...state, ...newState };
  if (newState.teams) state.teams = newState.teams;
  if (newState.theme) state.theme = newState.theme;
  applyThemeCSS(state.theme);
  renderOverlay();
});

socket.on('globalThemeUpdate', (theme) => {
  if (!theme) return;
  state.theme = { ...state.theme, ...theme };
  applyThemeCSS(state.theme);
});

socket.on('databaseUpdated', (newState) => {
  if (newState && newState.teams) {
    state.teams = newState.teams;
    renderOverlay();
  }
});

/* ═══════════════════════════════════════════════════════════════════════
   THEME APPLICATION
   ═══════════════════════════════════════════════════════════════════════ */
function applyThemeCSS(theme) {
  const root = document.documentElement;
  root.style.setProperty('--primary-color', theme.primaryColor);
  root.style.setProperty('--accent-glow', theme.accentGlow);
  root.style.setProperty('--bg-dark', theme.bgDark);
  root.style.setProperty('--bg-panel', adjustAlpha(theme.bgDark, 0.92));
  root.style.setProperty('--text-main', theme.textMain);
  root.style.setProperty('--border-glow', hexToRgba(theme.primaryColor, 0.4));
}

/* ═══════════════════════════════════════════════════════════════════════
   OVERLAY RENDERING
   ═══════════════════════════════════════════════════════════════════════ */
function renderOverlay() {
  renderTournamentBranding();
  renderScoreboard();
  renderMatchChip();
  renderSponsor();
  checkEliminations();
}

function renderTournamentBranding() {
  const wm = document.getElementById('tourWatermark');
  const t = state.tournament;
  if (t && t.name) {
    wm.style.display = 'flex';
    document.getElementById('twName').textContent = t.name;
    document.getElementById('twLogo').src = t.logo || '';
    document.getElementById('twLogo').style.display = t.logo ? 'block' : 'none';
    // Also update scoreboard header
    document.getElementById('sbTourName').textContent = t.name;
    document.getElementById('sbTourLogo').src = t.logo || '';
    document.getElementById('sbTourLogo').style.display = t.logo ? 'block' : 'none';
  } else {
    wm.style.display = 'none';
  }
}

function renderScoreboard() {
  const wrap = document.getElementById('scoreboardWrap');
  const rowsEl = document.getElementById('teamRows');
  const teams = (state.teams || []).filter(t => t.teamName && t.teamName !== '');

  if (teams.length === 0) {
    wrap.style.display = 'block';
    rowsEl.innerHTML = '<div class="empty-state">No Teams Yet<span class="empty-state-hint">Add teams from the controller</span></div>';
    return;
  }

  wrap.style.display = 'block';
  rowsEl.innerHTML = '';

  // Sort by kills desc (or could be points in future)
  const sorted = [...teams].sort((a, b) => {
    const aKills = a.liveStats?.kills || 0;
    const bKills = b.liveStats?.kills || 0;
    return bKills - aKills;
  });

  sorted.forEach((team, idx) => {
    const alive = team.liveStats?.alive || 0;
    const kills = team.liveStats?.kills || 0;
    const isDead = alive === 0;

    const row = document.createElement('div');
    row.className = 'team-row' + (isDead ? ' dead' : '');
    row.style.setProperty('--team-accent', team.themeColor || state.theme.primaryColor);
    row.onmouseenter = () => showPlayerPopup(team);
    row.onmouseleave = () => hidePlayerPopup();

    // Rank
    let html = '<div class="t-rank">' + (idx + 1) + '</div>';

    // Logo
    if (team.logoUrl) {
      html += '<div class="t-logo"><img src="' + escAttr(team.logoUrl) + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div class=\\\'t-logo-fallback\\\'>' + escHtml(team.shortName || ('T'+team.id)) + '</div>\'"></div>';
    } else {
      html += '<div class="t-logo"><div class="t-logo-fallback">' + escHtml(team.shortName || ('T' + team.id)) + '</div></div>';
    }

    // Name
    html += '<div class="t-name">' + escHtml(team.teamName) + '</div>';

    // Life bars (4 bars — green=alive, gray=dead)
    let lifeHTML = '<div class="t-life">';
    for (let i = 0; i < 4; i++) {
      lifeHTML += '<div class="life-bar ' + (i < alive ? 'alive' : 'dead') + '"></div>';
    }
    lifeHTML += '</div>';

    // Kills
    html += lifeHTML;
    html += '<div class="t-kills">' + kills + '</div>';

    row.innerHTML = html;
    rowsEl.appendChild(row);
  });
}

function renderMatchChip() {
  const chip = document.getElementById('matchChip');
  const t = state.tournament;
  if (t && t.name) {
    chip.style.display = 'flex';
    document.getElementById('mcLabel').textContent = 'Live';
    document.getElementById('mcValue').textContent = 'Match 1';
  } else {
    chip.style.display = 'none';
  }
}

function renderSponsor() {
  const sw = document.getElementById('sponsorWrap');
  const t = state.tournament;
  if (t && (t.sponsor || t.sponsorLogo)) {
    sw.style.display = 'flex';
    document.getElementById('sponsorLabel').textContent = t.sponsor || '';
    document.getElementById('sponsorLabel').style.display = t.sponsor ? 'block' : 'none';
    document.getElementById('sponsorLogo').src = t.sponsorLogo || '';
    document.getElementById('sponsorLogo').style.display = t.sponsorLogo ? 'block' : 'none';
  } else {
    sw.style.display = 'none';
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   ELIMINATION DETECTION & BANNER
   ═══════════════════════════════════════════════════════════════════════ */
function checkEliminations() {
  const teams = state.teams || [];
  teams.forEach(team => {
    const id = team.id;
    const currentAlive = team.liveStats?.alive || 0;
    const prevAlive = prevAliveCount[id] ?? 4;

    // Team just got wiped (was alive, now 0)
    if (prevAlive > 0 && currentAlive === 0 && team.teamName) {
      showElimBanner(team);
    }

    prevAliveCount[id] = currentAlive;
  });
}

function showElimBanner(team) {
  const banner = document.getElementById('elimBanner');
  document.getElementById('elimLogo').src = team.logoUrl || '';
  document.getElementById('elimLogo').style.display = team.logoUrl ? 'block' : 'none';
  document.getElementById('elimTeamName').textContent = team.teamName;

  // Calculate placement (count dead teams)
  const deadCount = (state.teams || []).filter(t => (t.liveStats?.alive || 0) === 0).length;
  const placement = 13 - deadCount; // 12 teams, reverse
  document.getElementById('elimPlace').textContent = '#' + placement + ' Placement';

  banner.style.display = 'flex';
  // Re-trigger animation
  banner.style.animation = 'none';
  void banner.offsetHeight;
  banner.style.animation = '';

  // Auto-hide after 4 seconds
  if (elimBannerTimer) clearTimeout(elimBannerTimer);
  elimBannerTimer = setTimeout(() => {
    banner.style.display = 'none';
  }, 4000);
}

/* ═══════════════════════════════════════════════════════════════════════
   PLAYER POPUP (hover)
   ═══════════════════════════════════════════════════════════════════════ */
function showPlayerPopup(team) {
  const popup = document.getElementById('playerPopup');
  document.getElementById('ppLogo').src = team.logoUrl || '';
  document.getElementById('ppLogo').style.display = team.logoUrl ? 'block' : 'none';
  document.getElementById('ppName').textContent = team.teamName;

  const playersEl = document.getElementById('ppPlayers');
  playersEl.innerHTML = '';
  (team.players || []).forEach((p, idx) => {
    const isAlive = (team.liveStats?.alive || 0) > idx;
    const row = document.createElement('div');
    row.className = 'pp-row';
    let html = '';
    if (p.img) {
      html += '<img class="pp-player-img" src="' + escAttr(p.img) + '" onerror="this.style.display=\'none\'">';
    } else {
      html += '<div class="pp-player-img"></div>';
    }
    html += '<div class="pp-player-name">' + escHtml(p.name || ('Player ' + (idx + 1))) + '</div>';
    html += '<div class="pp-player-status ' + (isAlive ? 'alive' : 'dead') + '"></div>';
    row.innerHTML = html;
    playersEl.appendChild(row);
  });

  popup.classList.add('active');
}

function hidePlayerPopup() {
  document.getElementById('playerPopup').classList.remove('active');
}

/* ═══════════════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════════════ */
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

function adjustAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

function escHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }


/* ═══════════════════════════════════════════════════════════════════════
   CHAMPION RUSH & POINT RUSH (OVERLAY)
   ═══════════════════════════════════════════════════════════════════════ */
let championRushThreshold = 80;

// Listen for standings updates from server
socket.on('standingsUpdated', (standings) => {
  renderStandingsOnOverlay(standings);
  updateRushProgress(standings);
});

// Listen for champion winner
socket.on('championRushUpdate', (champion) => {
  if (champion) showChampionCelebration(champion);
});

function renderStandingsOnOverlay(standings) {
  if (!standings || !Array.isArray(standings)) return;
  const rowsEl = document.getElementById('teamRows');
  if (!rowsEl) return;
  rowsEl.innerHTML = '';

  standings.forEach((team, idx) => {
    const alive = team.liveStats?.alive || 0;
    const kills = team.totalKills || 0;
    const isDead = alive === 0;
    const eligible = team.isEligible;
    const winner = team.isTournamentWinner;

    const row = document.createElement('div');
    let classes = 'team-row';
    if (isDead) classes += ' dead';
    if (eligible) classes += ' champion-eligible';
    row.className = classes;
    row.style.setProperty('--team-accent', team.themeColor || state.theme.primaryColor);
    row.onmouseenter = () => showPlayerPopup(state.teams.find(t => t.id === team.teamId) || team);
    row.onmouseleave = () => hidePlayerPopup();

    let html = '<div class="t-rank">' + (idx + 1) + '</div>';

    // Logo
    if (team.logoUrl) {
      html += '<div class="t-logo"><img src="' + escAttr(team.logoUrl) + '" onerror="this.style.display=\'none\'"></div>';
    } else {
      html += '<div class="t-logo"><div class="t-logo-fallback">' + escHtml(team.shortName || ('T'+team.teamId)) + '</div></div>';
    }

    // Name + headstart
    html += '<div class="t-name">' + escHtml(team.teamName);
    if (team.headstartPoints > 0) {
      html += ' <span class="t-headstart">+' + team.headstartPoints + '</span>';
    }
    html += '</div>';

    // Life bars
    html += '<div class="t-life">';
    for (let i = 0; i < 4; i++) {
      html += '<div class="life-bar ' + (i < alive ? 'alive' : 'dead') + '"></div>';
    }
    html += '</div>';

    // Total points (instead of just kills)
    html += '<div class="t-kills">' + (team.totalPoints || 0) + '</div>';

    row.innerHTML = html;
    rowsEl.appendChild(row);
  });
}

function updateRushProgress(standings) {
  if (!standings || !standings.length) return;
  const top = standings[0];
  const points = top.totalPoints || 0;
  const pct = Math.min(100, (points / championRushThreshold) * 100);

  const bar = document.getElementById('rushProgress');
  const fill = document.getElementById('rushFill');
  const label = document.getElementById('rushLabel');

  if (bar && fill && label) {
    bar.style.display = 'block';
    fill.style.width = pct + '%';
    label.textContent = 'Rush ' + championRushThreshold + ' | ' + points + 'pts';
  }
}

function showChampionCelebration(champion) {
  const el = document.getElementById('championCelebration');
  document.getElementById('champTeam').textContent = champion.teamName;
  document.getElementById('champPoints').textContent = champion.totalPoints + ' Points';
  el.classList.add('active');

  // Auto-hide after 8 seconds
  setTimeout(() => { el.classList.remove('active'); }, 8000);
}

// Update threshold from state
socket.on('stateUpdated', (newState) => {
  if (newState && newState.tournamentSettings && newState.tournamentSettings.championRushThreshold) {
    championRushThreshold = newState.tournamentSettings.championRushThreshold;
  }
});

/* ═══════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════ */
// Fetch initial state
fetch('/api/state')
  .then(r => r.json())
  .then(data => {
    if (data) {
      state = { ...state, ...data };
      if (data.theme) applyThemeCSS(data.theme);
      // Initialize prevAliveCount
      (state.teams || []).forEach(t => { prevAliveCount[t.id] = t.liveStats?.alive || 4; });
      renderOverlay();
    }
  })
  .catch(err => console.log('[Overlay] Init:', err.message));
</script>
